version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rushcart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rushcart"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 8

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/rushcart
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: replace-with-at-least-32-bytes-secret
      ADMIN_EMAIL: admin@rushcart.local
      ADMIN_PASSWORD: ChangeThisAdminPassword123!
      API_V1_STR: /api/v1
      DEBUG: "true"
      CORS_ORIGINS: http://localhost:5173,http://localhost:80
      TRUSTED_HOSTS: localhost,127.0.0.1,backend
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ENFORCE_SELLER_SUBSCRIPTION: "true"
      LOG_JSON: "true"
      LOG_LEVEL: INFO
      OTEL_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./Backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend

  delivery-service:
    build:
      context: ./Delivery-Service
    environment:
      PORT: 4001
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "4001:4001"

volumes:
  postgres_data:
  redis_data:
  elastic_data:
