name: CI

on:
  pull_request:
  push:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/rushcart_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-with-at-least-32-bytes
      ADMIN_EMAIL: admin@rushcart.local
      ADMIN_PASSWORD: ChangeThisAdminPassword123!
      FRONTEND_URL: http://localhost:5173
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall -q app
      - name: Run backend tests with coverage
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=8

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  delivery:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Delivery-Service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Delivery-Service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: node --check src/server.js

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend, delivery]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build -t rushcart-backend:ci ./Backend
      - name: Build frontend image
        run: docker build -t rushcart-frontend:ci ./Frontend
      - name: Build delivery image
        run: docker build -t rushcart-delivery:ci ./Delivery-Service
