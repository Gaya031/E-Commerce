name: Deploy Orchestration

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
          - all
      image_tag:
        description: "Image tag to deploy"
        required: true
        default: "latest"
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy-staging:
    if: ${{ inputs.target == 'staging' || inputs.target == 'all' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Validate staging secrets
        run: |
          test -n "${{ secrets.STAGING_HOST }}"
          test -n "${{ secrets.STAGING_USER }}"
          test -n "${{ secrets.STAGING_SSH_KEY }}"
          test -n "${{ secrets.STAGING_APP_DIR }}"
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ secrets.STAGING_APP_DIR }}
            export DEPLOY_TAG="${{ inputs.image_tag }}"
            docker compose pull
            docker compose up -d --remove-orphans
            curl -fsS http://localhost:8000/api/v1/system/health/ready >/dev/null

  deploy-production:
    if: ${{ inputs.target == 'production' || inputs.target == 'all' }}
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-staging]
    steps:
      - name: Validate production secrets
        run: |
          test -n "${{ secrets.PROD_HOST }}"
          test -n "${{ secrets.PROD_USER }}"
          test -n "${{ secrets.PROD_SSH_KEY }}"
          test -n "${{ secrets.PROD_APP_DIR }}"
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ secrets.PROD_APP_DIR }}
            export DEPLOY_TAG="${{ inputs.image_tag }}"
            docker compose pull
            docker compose up -d --remove-orphans
            curl -fsS http://localhost:8000/api/v1/system/health/ready >/dev/null
