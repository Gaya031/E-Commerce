name: Resilience Smoke

on:
  workflow_dispatch:

jobs:
  resilience-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d postgres redis elasticsearch backend
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install checker deps
        run: |
          python -m pip install --upgrade pip
          pip install httpx
      - name: Run resilience smoke checker
        run: python Backend/scripts/resilience_check.py --base-url http://localhost:8000/api/v1 --iterations 80 --concurrency 10
      - name: Run load test
        run: python Backend/scripts/load_test.py --base-url http://localhost:8000/api/v1 --iterations 500 --concurrency 25
      - name: Chaos test - stop redis and verify degraded
        run: |
          docker compose stop redis
          python Backend/scripts/failover_check.py --base-url http://localhost:8000/api/v1 --expect degraded --timeout-seconds 50
      - name: Chaos test - restart redis and verify recovery
        run: |
          docker compose start redis
          python Backend/scripts/failover_check.py --base-url http://localhost:8000/api/v1 --expect ready --timeout-seconds 80
      - name: Print backend logs on failure
        if: failure()
        run: docker compose logs backend
      - name: Shutdown stack
        if: always()
        run: docker compose down -v
